<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
  background: white;
  padding: 30px;
  width: 350px;
  border-radius: 12px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.input-box {
  margin-bottom: 15px;
  position: relative;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 6px;
  outline: none;
  transition: 0.3s;
}

.input-box input:focus {
  border-color: #667eea;
}

.toggle {
  position: absolute;
  right: 10px;
  top: 10px;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #5a67d8;
}

.error {
  color: red;
  font-size: 12px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <form id="form">

    <div class="input-box">
      <input type="text" id="name" placeholder="Full Name" required>
    </div>

    <div class="input-box">
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password" required>
      <span class="toggle" onclick="togglePassword()">👁️</span>
    </div>

    <div class="input-box">
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <span class="toggle" onclick="toggleConfirmPassword()">👁️</span>
    </div>

    <div class="error" id="errorMsg"></div>

    <button type="submit">Sign Up</button>
  </form>
</div>

<script>
const form = document.getElementById("form");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const errorMsg = document.getElementById("errorMsg");

// Password regex
const pattern = /^(?=.[A-Z])(?=.[\W_]).{8,}$/;

// Toggle functions
function togglePassword() {
  password.type = password.type === "password" ? "text" : "password";
}

function toggleConfirmPassword() {
  confirmPassword.type = confirmPassword.type === "password" ? "text" : "password";
}

// Form submit
form.addEventListener("submit", function(e) {
  e.preventDefault();

  if (!pattern.test(password.value)) {
    errorMsg.textContent = "Password must be 8+ chars, include uppercase & special character!";
    return;
  }

  if (password.value !== confirmPassword.value) {
    errorMsg.textContent = "Passwords do not match!";
    return;
  }

  errorMsg.textContent = "";
  alert("Registered Successfully ✅");
});
</script>

</body>
</html>
